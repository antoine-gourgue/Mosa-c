name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://mosaic:mosaic@localhost:5432/mosaic?schema=public
      AUTH_SECRET: ci-test-secret-ci-test-secret-ci-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://mosaic:mosaic@localhost:5432/mosaic?schema=public
      AUTH_SECRET: ci-test-secret-ci-test-secret-ci-test
      CI: "true"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mosaic
          POSTGRES_PASSWORD: mosaic
          POSTGRES_DB: mosaic
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mosaic -d mosaic"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Seed the database
        run: npm run db:seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
    steps:
      # Runs only once the deployment secrets are configured, so CI stays green
      # before the VPS is wired up.
      - name: Deploy over SSH
        if: env.VPS_HOST != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_PATH }}"
            git fetch --all
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
            docker image prune -f
