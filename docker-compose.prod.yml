name: mosaic

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB are read from .env.production.
    env_file: .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mosaic} -d ${POSTGRES_DB:-mosaic}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: migrator
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
      # NEXT_PUBLIC_* are inlined into the client bundle at build time, so they
      # are passed as build args (sourced from the shell / compose .env), not via
      # env_file which only applies at runtime.
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
        NEXT_PUBLIC_REALTIME_URL: ${NEXT_PUBLIC_REALTIME_URL:-}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Realtime WebSocket service (socket.io) for live messaging and presence.
  # Bound to localhost only; the host reverse proxy routes /socket.io/ to it
  # (see realtime/README.md). Shares AUTH_SECRET + DATABASE_URL via .env.production.
  realtime:
    build:
      context: .
      dockerfile: realtime/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REALTIME_PORT:-4001}:4001"
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
